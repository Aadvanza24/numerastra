# /etc/nginx/sites-available/numerastra
#
# Numerastra — Nginx configuration
# Handles:
#   - HTTPS termination with Let's Encrypt SSL
#   - Reverse proxy to Node.js API on port 3000
#   - Static frontend serving
#   - Rate limiting for OTP and AI endpoints
#   - Security headers
#   - Gzip compression
#   - HTTP → HTTPS redirect
#
# Setup:
#   sudo ln -s /etc/nginx/sites-available/numerastra /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

# ── Rate limiting zones ────────────────────────────────────────────────
# Defined in http block — if you manage your own nginx.conf,
# add these inside the http {} block there instead.

limit_req_zone $binary_remote_addr zone=otp:10m rate=5r/m;      # OTP sends: 5/min per IP
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;     # General API: 30/min per IP
limit_req_zone $binary_remote_addr zone=ai:10m rate=10r/m;      # AI endpoint: 10/min per IP

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name numerastra.com www.numerastra.com;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Main HTTPS server ─────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name numerastra.com www.numerastra.com;

    # ── SSL (managed by Certbot — do not edit manually) ────────────
    ssl_certificate     /etc/letsencrypt/live/numerastra.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/numerastra.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ───────────────────────────────────────────
    add_header X-Frame-Options          "SAMEORIGIN"            always;
    add_header X-Content-Type-Options   "nosniff"               always;
    add_header X-XSS-Protection         "1; mode=block"         always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy       "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy  "default-src 'self'; script-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://checkout.razorpay.com https://js.stripe.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://api.anthropic.com https://api.razorpay.com https://api.stripe.com;" always;

    # ── Gzip ───────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_types        text/plain text/css application/json application/javascript
                      text/javascript application/x-javascript text/xml application/xml;

    # ── Logging ────────────────────────────────────────────────────
    access_log /var/log/nginx/numerastra-access.log;
    error_log  /var/log/nginx/numerastra-error.log;

    # ── Request size limit (protect against large payload attacks) ──
    client_max_body_size 1m;

    # ── Static frontend ────────────────────────────────────────────
    # numerastra.html served as root. Change this path to match where
    # you've uploaded the file.
    root  /var/www/numerastra/public;
    index numerastra.html;

    location / {
        try_files $uri $uri/ /numerastra.html;

        # Cache static assets aggressively
        location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # ── OTP endpoints — strict rate limiting ───────────────────────
    location /api/auth/otp/ {
        limit_req zone=otp burst=3 nodelay;
        limit_req_status 429;

        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # ── AI endpoint — per-IP rate limiting ─────────────────────────
    location /api/ai/ {
        limit_req zone=ai burst=5 nodelay;
        limit_req_status 429;

        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Longer timeout for AI responses
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ── Webhook endpoints — no rate limiting (Stripe/Razorpay need raw body) ──
    location /api/payments/ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Critical: pass raw body to Node.js for webhook signature verification
        proxy_request_buffering off;
    }

    # ── All other API routes ────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        limit_req_status 429;

        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 30s;
    }

    # ── Health check (no rate limit, no logging) ───────────────────
    location /api/health {
        access_log off;
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
    }

    # ── Block common attack paths ──────────────────────────────────
    location ~ /\. {
        deny all;
    }
    location = /favicon.ico {
        log_not_found off;
        access_log    off;
    }
}
